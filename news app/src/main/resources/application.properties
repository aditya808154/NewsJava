spring.application.name=news

# Database URL mein delay aur exit parameters add kiye hain
spring.datasource.url=jdbc:h2:file:./data/newsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Yeh line console ko browser mein access karne degi
spring.h2.console.settings.web-allow-others=true